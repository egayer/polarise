.psd11d7d10 .pl-bar {

.psd11d7d10 .pl-bar::before,
.psd11d7d10 .pl-bar::after {

    top: 0;

}

.psd11d7d10 .pl-bar::before {

    width: calc(var(--neg, 0) * 50%);

}

.psd11d7d10 .pl-bar::after {
    left: 50%;
    width: calc(var(--pos, 0) * 50%);
    background-color: var(--bar-color, steelblue);
}

.psd11d7d10 .pl-bar > span {
    position: relative;
    z-index: 1;
